<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mana Vizītkarte</title>
    <!-- Šis pieslēdz modernas ikonas pogām -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #0f172a, #1e293b); color: #f8fafc; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 400px; padding: 40px 30px; border-radius: 24px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .profile-img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid #38bdf8; margin-bottom: 20px; box-shadow: 0 0 20px rgba(56, 189, 248, 0.4); }
        h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; color: #fff; }
        .headline { font-size: 1rem; color: #94a3b8; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        .links-container { display: flex; flex-direction: column; gap: 15px; }
        .btn { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 14px; border-radius: 12px; text-decoration: none; font-weight: 600; font-size: 1rem; transition: all 0.3s ease; color: #fff; }
        .btn i { font-size: 1.2rem; width: 20px; }
        
        /* Pogas specifiskās krāsas */
        .btn-fb { background: #1877f2; }
        .btn-fb:hover { background: #145dbf; transform: translateY(-2px); }
        .btn-tt { background: #000000; border: 1px solid rgba(255,255,255,0.2); }
        .btn-tt:hover { background: #252525; transform: translateY(-2px); }
        .btn-email { background: #0ea5e9; }
        .btn-email:hover { background: #0284c7; transform: translateY(-2px); }
        .btn-phone { background: #10b981; }
        .btn-phone:hover { background: #059669; transform: translateY(-2px); }
                /* Zīmolu joslas stili */
        .partners-section { margin-top: 35px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 25px; }
        .partners-title { font-size: 0.85rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; font-weight: 600; }
        .logos-container { display: flex; justify-content: center; align-items: center; gap: 25px; flex-wrap: wrap; }
        .partner-logo { height: 25px; max-width: 110px; object-fit: contain; filter: grayscale(100%) brightness(1.6); opacity: 0.6; transition: all 0.3s ease; }
        .partner-logo:hover { filter: grayscale(0%) brightness(1); opacity: 1; transform: scale(1.05); }

    </style>
</head>
<body>

    <div class="card">
        <!-- Tava bilde (Nomaini profilu.jpg uz savas bildes faila nosaukumu) -->
        <img src="profilu.jpg" alt="Profila bilde" class="profile-img">
        
        <!-- Tavi teksti -->
        <h1>Jūsu Vārds Uzvārds</h1>
        <div class="headline">Elektronikas komponentre/Industriālā elektronika</div>
        
        <!-- Sociālo tīklu un kontaktu pogas -->
        <div class="links-container">
            <a href="https://facebook.com" target="_blank" class="btn btn-fb">
                <i class="fab fa-facebook-f"></i> Facebook
            </a>
            
            <a href="https://tiktok.com" target="_blank" class="btn btn-tt">
                <i class="fab fa-tiktok"></i> TikTok
            </a>
            
            <a href="mailto:tavs@epasts.lv" class="btn btn-email">
                <i class="fas fa-envelope"></i> E-pasts
            </a>
            
            <a href="tel:+37120000000" class="btn btn-phone">
                <i class="fas fa-phone-alt"></i> Zvanīt
            </a>
        </div>
    </div>
        <!-- Populārākie elektrokomponentu un skapju zīmoli -->
        <div class="partners-section">
            <div class="partners-title">Piedāvātie Zīmoli & Sadarbība</div>
            <div class="logos-container">
                <!-- TME (Transfer Multisort Elektronik) -->
                <img src="https://wikimedia.org" alt="TME.de" class="partner-logo" title="TME components">
                
                <!-- ABB (Automāti, industriālie skapji) -->
                <img src="https://wikimedia.org" alt="ABB" class="partner-logo" title="ABB">
                
                <!-- Schneider Electric (Acti9 automāti, Prisma skapji) -->
                <img src="https://wikimedia.org" alt="Schneider Electric" class="partner-logo" title="Schneider Electric">
                
                <!-- Hager (Lieliskas skapju komponentes un moduļi) -->
                <img src="https://wikimedia.org" alt="Hager" class="partner-logo" title="Hager">
                
                <!-- Siemens (Industriālā automātika, LOGO!, S7, kontaktori) -->
                <img src="https://wikimedia.org" alt="Siemens" class="partner-logo" title="Siemens">
                
                <!-- Eaton / Moeller (Automātika un jaudas slēdži) -->
                <img src="https://wikimedia.org" alt="Eaton" class="partner-logo" title="Eaton">
                
                <!-- Phoenix Contact (Spailes, pārsprieguma aizsardzība skapjiem) -->
                <img src="https://wikimedia.org" alt="Phoenix Contact" class="partner-logo" title="Phoenix Contact">
            </div>
        </div>

</body>
</html>
