<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NL Elektro - Automātika un Elektromontāža</title>
    
    <!-- Ikonas sociālajiem tīkliem -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Pamata stili (NL Elektro industriālais stils - tumšs ar dzeltenu/oranžu akcentu) */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #1a1a1a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        /* 1. Logo vieta augšā pa vidu */
        .logo-area {
            margin-top: 30px;
            margin-bottom: 15px;
        }
        
        .logo-placeholder {
            width: 120px;
            height: 120px;
            background-color: #2a2a2a;
            border: 3px solid #ffcc00; /* Zibens dzeltenais akcents */
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: #ffcc00;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.2);
        }

        /* 2. Teksts ar nodarbošanos */
        .brand-name {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        
        .brand-subtitle {
            font-size: 1.1rem;
            color: #aaaaaa;
            margin-bottom: 30px;
            font-weight: 400;
        }

        /* 3. Dropdown izvēlne navigācijai */
        .dropdown {
            position: relative;
            display: inline-block;
            width: 100%;
            margin-bottom: 35px;
        }

        .dropdown-btn {
            background-color: #ffcc00;
            color: #1a1a1a;
            padding: 14px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.3s;
        }

        .dropdown-btn:hover {
            background-color: #e6b800;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #2a2a2a;
            width: 100%;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.5);
            border-radius: 8px;
            margin-top: 5px;
            z-index: 1;
            overflow: hidden;
            border: 1px solid #444;
        }

        .dropdown-content a {
            color: white;
            padding: 14px 16px;
            text-decoration: none;
            display: block;
            text-align: left;
            transition: background 0.2s;
        }

        .dropdown-content a:hover {
            background-color: #3a3a3a;
            color: #ffcc00;
        }

        .show {
            display: block;
        }

        /* 4. Sociālie tīkli un kontakti */
        .social-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 45px;
        }

        .social-btn {
            background-color: #2a2a2a;
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: 1px solid #333;
            transition: all 0.3s;
        }

        .social-btn:hover {
            background-color: #333;
            border-color: #ffcc00;
            transform: translateY(-2px);
        }

        .social-btn i {
            font-size: 1.3rem;
        }

        /* 5. Sadarbības partneri */
        .partners-section {
            margin-top: 20px;
            border-top: 1px solid #333;
            padding-top: 30px;
        }

        .partners-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #777777;
            margin-bottom: 20px;
        }

        .partners-logos {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            opacity: 0.6;
            transition: opacity 0.3s;
        }
        
        .partners-logos:hover {
            opacity: 0.9;
        }

        .partner-tag {
            background-color: #222;
            padding: 8px 15px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: bold;
            color: #ccc;
            border: 1px solid #333;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- 1. Logo vieta pa vidu -->
        <div class="logo-area">
            <!-- Kad Tev būs bildes fails, aizvieto tekstu ar: <img src="logo.png" alt="NL Elektro Logo"> -->
            <div class="logo-placeholder">NL Elektro</div>
        </div>

        <!-- 2. Nodarbošanās teksts -->
        <h1 class="brand-name">NL ELEKTRO</h1>
        <p class="brand-subtitle">Rūpnieciskā automātika &bull; Elektromontāža &bull; Skapju būvniecība</p>

        <!-- 3. Dropdown izvēlne lapām -->
        <div class="dropdown">
            <button onclick="toggleDropdown()" class="dropdown-btn">
                Izvēlies sadaļu... <i class="fas fa-chevron-down"></i>
            </button>
            <div id="myDropdown" class="dropdown-content">
                <!-- Nomaini saites uz savām GitHub apakšlapām (piem., par-mums.html), kad tās izveidosi -->
                <a href="#par-mums"><i class="fas fa-info-circle"></i> Par mums</a>
                <a href="#pakalpojumi"><i class="fas fa-tools"></i> Pakalpojumi</a>
                <a href="#rekviziti"><i class="fas fa-file-invoice"></i> Rekvizīti</a>
            </div>
        </div>

        <!-- 4. Sociālie tīkli un ātrie kontakti -->
        <div class="social-grid">
            <!-- Nomaini saites uz saviem reālajiem profiliem -->
            <a href="https://facebook.com" target="_blank" class="social-btn">
                <i class="fab fa-facebook-f" style="color: #1877F2;"></i> Facebook
            </a>
            <a href="https://tiktok.com" target="_blank" class="social-btn">
                <i class="fab fa-tiktok" style="color: #00f2fe;"></i> TikTok
            </a>
            <!-- Ieraksti savu epastu aiz "mailto:" -->
            <a href="mailto:info@nlelektro.lv" class="social-btn">
                <i class="fas fa-envelope" style="color: #ffcc00;"></i> E-pasts
            </a>
            <!-- Ieraksti savu tālruni aiz "tel:" -->
            <a href="tel:+37120000000" class="social-btn">
                <i class="fas fa-phone-alt" style="color: #25D366;"></i> Zvanīt
            </a>
        </div>

        <!-- 5. Sadarbības partneru zīmoli -->
        <div class="partners-section">
            <h3 class="partners-title">Komponentes un sadarbības partneri</h3>
            <div class="partners-logos">
                <span class="partner-tag">SIEMENS</span>
                <span class="partner-tag">ABB</span>
                <span class="partner-tag">SCHNEIDER ELECTRIC</span>
                <span class="partner-tag">PHOENIX CONTACT</span>
                <span class="partner-tag">FINDER</span>
                <span class="partner-tag">EATON</span>
            </div>
        </div>

    </div>

    <!-- JavaScript funkcija priekš Dropdown atvēršanas/aizvēršanas -->
    <script>
        function toggleDropdown() {
            document.getElementById("myDropdown").classList.toggle("show");
        }

        // Aizver dropdown, ja lietotājs noklikšķina kaut kur citur ekrānā
        window.onclick = function(event) {
            if (!event.target.matches('.dropdown-btn') && !event.target.matches('.dropdown-btn *')) {
                var dropdowns = document.getElementsByClassName("dropdown-content");
                for (var i = 0; i < dropdowns.length; i++) {
                    var openDropdown = dropdowns[i];
                    if (openDropdown.classList.contains('show')) {
                        openDropdown.classList.remove('show');
                    }
                }
            }
        }
    </script>

</body>
</html>
